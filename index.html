<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Image Gallery</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Verdana, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#141e30,#243b55);
      padding:20px;
      color:white;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:40px;
    }

    /* FILTER BUTTONS */

    .buttons{
      text-align:center;
      margin-bottom:25px;
    }

    .buttons button{
      padding:10px 20px;
      border:none;
      margin:5px;
      border-radius:25px;
      background:white;
      color:#333;
      cursor:pointer;
      font-weight:bold;
      transition:0.4s;
    }

    .buttons button:hover{
      background:#ff9800;
      color:white;
      transform:scale(1.1);
    }

    /* GALLERY */

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
      cursor:pointer;
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
      transition:0.5s;
    }

    .card:hover img{
      transform:scale(1.12);
      filter:blur(1px) brightness(60%);
    }

    .content{
      position:absolute;
      bottom:-100px;
      left:0;
      width:100%;
      padding:20px;
      text-align:center;
      transition:0.5s;
      background:rgba(0,0,0,0.5);
    }

    .card:hover .content{
      bottom:0;
    }

    .content h3{
      margin-bottom:8px;
    }

    /* LIGHTBOX */

    .lightbox{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.95);
      justify-content:center;
      align-items:center;
      z-index:999;
      flex-direction:column;
    }

    .lightbox img{
      width:80%;
      max-width:850px;
      border-radius:15px;
    }

    .close{
      position:absolute;
      top:20px;
      right:30px;
      font-size:45px;
      color:white;
      cursor:pointer;
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:40px;
      color:white;
      background:rgba(255,255,255,0.2);
      padding:10px 18px;
      border-radius:50%;
      cursor:pointer;
      user-select:none;
    }

    .prev{
      left:25px;
    }

    .next{
      right:25px;
    }

    .nav:hover{
      background:#ff9800;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      h1{
        font-size:28px;
      }

      .card img{
        height:220px;
      }

      .lightbox img{
        width:95%;
      }
    }

  </style>
</head>

<body>

  <h1>✨ Modern Image Gallery ✨</h1>

  <!-- FILTER BUTTONS -->

  <div class="buttons">
    <button onclick="filterGallery('all')">All</button>
    <button onclick="filterGallery('nature')">Nature</button>
    <button onclick="filterGallery('travel')">Travel</button>
    <button onclick="filterGallery('animals')">Animals</button>
  </div>

  <!-- GALLERY -->

  <div class="gallery">

    <div class="card nature">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="">
      <div class="content">
        <h3>Nature</h3>
        <p>Beautiful mountains view</p>
      </div>
    </div>

    <div class="card travel">
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?w=800" alt="">
      <div class="content">
        <h3>Travel</h3>
        <p>City night lights</p>
      </div>
    </div>

    <div class="card animals">
      <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=800" alt="">
      <div class="content">
        <h3>Animals</h3>
        <p>Cute dog portrait</p>
      </div>
    </div>

    <div class="card nature">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800" alt="">
      <div class="content">
        <h3>Nature</h3>
        <p>Forest river scenery</p>
      </div>
    </div>

    <div class="card travel">
      <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=800" alt="">
      <div class="content">
        <h3>Travel</h3>
        <p>Road adventure</p>
      </div>
    </div>

    <div class="card animals">
      <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=800" alt="">
      <div class="content">
        <h3>Animals</h3>
        <p>Wild lion king</p>
      </div>
    </div>

  </div>

  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <span class="nav prev">&#10094;</span>

    <img id="lightbox-img">

    <span class="nav next">&#10095;</span>

  </div>

  <script>

    const images = document.querySelectorAll(".card img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    const closeBtn = document.querySelector(".close");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");

    let current = 0;

    // OPEN LIGHTBOX

    images.forEach((img,index)=>{

      img.addEventListener("click",()=>{
        current = index;
        showImage();
        lightbox.style.display="flex";
      });

    });

    // SHOW IMAGE

    function showImage(){
      lightboxImg.src = images[current].src;
    }

    // NEXT

    nextBtn.addEventListener("click",()=>{
      current = (current + 1) % images.length;
      showImage();
    });

    // PREVIOUS

    prevBtn.addEventListener("click",()=>{
      current = (current - 1 + images.length) % images.length;
      showImage();
    });

    // CLOSE

    closeBtn.addEventListener("click",()=>{
      lightbox.style.display="none";
    });

    // FILTER

    function filterGallery(category){

      const cards = document.querySelectorAll(".card");

      cards.forEach(card=>{

        if(category === "all"){
          card.style.display="block";
        }

        else if(card.classList.contains(category)){
          card.style.display="block";
        }

        else{
          card.style.display="none";
        }

      });

    }

  </script>

</body>
</html>
